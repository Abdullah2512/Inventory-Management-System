<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in · Stockroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/auth.css">
  </head>
  <body>

    <div class="auth-backdrop">
      <div class="auth-blob b1"></div>
      <div class="auth-blob b2"></div>
      <div class="auth-blob b3"></div>
      <div class="auth-grid-overlay"></div>
    </div>

    <div class="auth-shell">
      <div class="auth-brand">
        <span class="brand-mark">SK</span>
        <div class="brand-text">
          <span class="brand-name">Stockroom</span>
          <span class="brand-sub">Inventory Console</span>
        </div>
      </div>

      <div class="auth-card">
        <h1 class="auth-heading">Welcome back</h1>
        <p class="auth-subtext">Log in to manage your inventory.</p>

        <form id="loginForm" novalidate>
          <div class="auth-field">
            <label for="email" class="auth-label">Email</label>
            <div class="auth-input-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="field-error" id="emailError"></div>
          </div>

          <div class="auth-field">
            <label for="password" class="auth-label">Password</label>
            <div class="auth-input-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="field-toggle" id="togglePassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="field-error" id="passwordError"></div>
          </div>

          <button type="submit" class="auth-submit" id="loginSubmit">
            <span class="btn-spinner"></span>
            <span class="btn-label">Sign in</span>
          </button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>

        <div class="auth-demo-note">
          Demo account — email: demo@stockroom.dev · password: Demo123!
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
