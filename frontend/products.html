<!-- frontend/products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stockify - Products</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    /* --- Base Variables for Neumorphism --- */
    :root {
  /* Soft Purplish Neumorphic Base */
  --bg-color: #EAE6F2;
  
  /* Text Colors */
  --text-main: #2D2738;
  --text-muted: #7A7289;
  
  /* Accents */
  --primary: #8B5CF6;
  --primary-hover: #7C3AED;
  --success: #10B981;
  --success-bg: #D1FAE5;
  --warning: #F59E0B;
  --warning-bg: #FEF3C7;
  --danger: #EF4444;
  --danger-bg: #FEE2E2;
  --info: #3B82F6;
  
  /* Neumorphic Shadows */
  --shadow-light: #FFFFFF;
  --shadow-dark: #CDC6D8;
  
  /* Depth Classes */
  --outset: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  --outset-sm: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  --inset: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
  --inset-sm: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
} 

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* --- User Provided Sidebar CSS --- */
    .sidebar {
      width: 280px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      border-right: 2px solid rgba(255, 255, 255, 0.4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-color);
      border-radius: 12px;
      box-shadow: var(--outset-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 1.125rem;
    }

    .brand-text h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }

    .brand-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
    }

    .nav-group {
      margin-bottom: 32px;
    }

    .nav-group-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      padding-left: 12px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }

    .nav-link i {
      display: flex;
      align-items: center;
      font-size: 1.25rem;
    }

    .nav-link.active {
      background: var(--bg-color);
      box-shadow: var(--outset);
      color: var(--primary);
    }

    .nav-link:hover:not(.active) {
      box-shadow: var(--outset-sm);
      color: var(--primary);
    }

    .sidebar-spacer {
      flex-grow: 1;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-color);
      border-radius: 16px;
      box-shadow: var(--outset);
      cursor: pointer;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: var(--outset-sm);
      /* Additions for text initials instead of image */
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #93c5fd; /* Light blue from image */
      color: #1e3a8a;
      font-weight: bold;
    }

    .user-info h4 {
      font-size: 0.875rem;
      font-weight: 600;
      margin: 0;
    }

    .user-info p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
    }

    .user-profile i {
      margin-left: auto;
      color: var(--text-muted);
    }

    /* --- Main Content Neumorphic Styles --- */
    .main-content {
      flex-grow: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .neo-card {
      background: var(--bg-color);
      border-radius: 20px;
      box-shadow: var(--outset);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .neo-card-inset {
      background: var(--bg-color);
      border-radius: 16px;
      box-shadow: var(--inset);
    }

    .neo-input {
      background: var(--bg-color);
      border: none;
      border-radius: 12px;
      box-shadow: var(--inset);
      padding: 12px 20px;
      color: var(--text-dark);
    }
    
    .neo-input:focus {
      background: var(--bg-color);
      box-shadow: var(--inset), 0 0 0 3px rgba(139, 92, 246, 0.2);
      outline: none;
    }

    .search-bar-container {
      position: relative;
      width: 320px;
    }

    .search-bar-container svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-bar-container input {
      padding-left: 44px;
      width: 100%;
      border-radius: 20px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--bg-color);
      box-shadow: var(--outset-sm);
      border: none;
      color: var(--text-muted);
      transition: 0.2s;
    }

    .icon-btn:hover {
      box-shadow: var(--outset);
      color: var(--primary);
    }

    .btn-primary-neo {
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      font-weight: 600;
      box-shadow: 4px 4px 10px rgba(139, 92, 246, 0.3), -2px -2px 10px rgba(255, 255, 255, 0.8);
      transition: 0.2s;
    }
    
    .btn-primary-neo:hover {
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
      color: white;
    }

    .stat-card {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stat-icon-wrapper {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
    }

    .stat-title {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
    }

    /* Table Styles */
   /* --- Dynamic Neumorphic Table Styles --- */
/* --- Complete Neumorphic Products Table CSS --- */

.neo-table-container {
  padding: 24px;
  background: var(--bg-color);
  box-shadow: var(--outset);
  border-radius: 20px;
}

.table {
  background: transparent !important;
  margin-bottom: 0;
  color: var(--text-dark);
  border-collapse: collapse;
}

.table thead th {
  background: transparent !important;
  border-bottom: 2px solid rgba(209, 217, 230, 0.6) !important;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 14px 16px;
}

.table tbody tr {
  background: transparent !important;
  transition: all 0.2s ease;
}

/* Subtle inset depth highlight on row hover */
.table tbody tr:hover {
  background: rgba(255, 255, 255, 0.4) !important;
  box-shadow: var(--inset);
}

.table td {
  background: transparent !important;
  border-bottom: 1px solid rgba(209, 217, 230, 0.4) !important;
  border-top: none !important;
  padding: 16px;
  vertical-align: middle;
  font-size: 0.875rem;
  font-weight: 500;
}

.table tbody tr:last-child td {
  border-bottom: none !important;
}

/* Refined Neumorphic Action Buttons */
.neo-action-btn {
  width: 34px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: var(--bg-color);
  box-shadow: var(--outset-sm);
  border: none;
  color: var(--text-muted);
  transition: all 0.2s ease;
  cursor: pointer;
}

.neo-action-btn:hover {
  box-shadow: var(--inset);
  color: var(--primary);
}

.neo-action-btn.delete:hover {
  color: #ef4444;
}

/* Status Badges */
.badge-soft-success {
  background: var(--bg-color);
  color: #10b981;
  box-shadow: var(--outset-sm);
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.75rem;
}

.badge-soft-warning {
  background: var(--bg-color);
  color: #f59e0b;
  box-shadow: var(--outset-sm);
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.75rem;
}

.badge-soft-danger {
  background: var(--bg-color);
  color: #ef4444;
  box-shadow: var(--outset-sm);
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.75rem;
}
  </style>
</head>
<body>

  <div class="app-layout">
    
    <!-- Sidebar utilizing user's provided CSS structure -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">IN</div>
        <div class="brand-text">
          <h2>Stockify</h2>
          <p>Inventory Manager</p>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Core</div>
        <a href="index.html" class="nav-link">
          <i>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          </i>
          Dashboard
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Manage</div>
        <a href="products.html" class="nav-link active">
          <i>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          </i>
          Products
        </a>
      </div>

      <div class="sidebar-spacer"></div>

      <!-- Using ID logoutBtn so the JS logic binds to it for logging out -->
      <div class="user-profile" id="logoutBtn" title="Click to Logout">
        <div class="user-avatar" id="userAvatar">AK</div>
        <div class="user-info">
          <h4 id="userName">Abdullah Khan</h4>
          <p id="userEmail">Admin</p>
        </div>
        <i>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </i>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header matching image -->
      <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h1 class="h2 fw-bold mb-2">Products</h1>
          <p class="text-muted mb-0">Manage and organize your inventory products.</p>
        </div>
        
        <div class="d-flex align-items-center gap-3">
          <div class="search-bar-container">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" class="neo-input" placeholder="Search products...">
          </div>
          
          <button class="icon-btn" title="Filter Options">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </button>
          
          <button type="button" class="btn-primary-neo d-flex align-items-center gap-2" id="openAddModalBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
          </button>
        </div>
      </header>

      <!-- Stats row matching image -->
      <div class="row g-4 mb-5">
        <div class="col-md-3">
          <div class="neo-card stat-card">
            <div class="stat-icon-wrapper neo-card-inset text-primary">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            <div>
              <div class="stat-title">All Products</div>
              <h3 class="stat-value" id="statTotalProducts">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="neo-card stat-card">
            <div class="stat-icon-wrapper neo-card-inset text-success">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div>
              <div class="stat-title">In Stock</div>
              <h3 class="stat-value" id="statInStock">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="neo-card stat-card">
            <div class="stat-icon-wrapper neo-card-inset text-warning">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div>
              <div class="stat-title">Low Stock</div>
              <h3 class="stat-value" id="statLowStock">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="neo-card stat-card">
            <div class="stat-icon-wrapper neo-card-inset text-danger">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <div>
              <div class="stat-title">Out of Stock</div>
              <h3 class="stat-value" id="statOutOfStock">0</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Hidden category filter helper to fully support JS logic binding -->
      <select id="categoryFilter" class="d-none">
        <option value="">All Categories</option>
      </select>

      <!-- Products Table -->
      <div class="neo-card neo-table-container">
  <div class="table-responsive">
    <table class="table align-middle">
      <thead>
        <tr>
          <th data-sort="name" style="cursor: pointer;">Product <span class="sort-caret ms-1"></span></th>
          <th data-sort="category" style="cursor: pointer;">Category <span class="sort-caret ms-1"></span></th>
          <th data-sort="quantity" style="cursor: pointer;">Stock <span class="sort-caret ms-1"></span></th>
          <th data-sort="price" style="cursor: pointer;">Price <span class="sort-caret ms-1"></span></th>
          <th>Quantity</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody id="productsTableBody">
        <!-- Dynamic database rows injected via app.js -->
      </tbody>
    </table>
  </div>
</div>
        
        <!-- Table Footer/Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top" style="border-color: rgba(209, 217, 230, 0.5) !important;">
          <span id="paginationInfo" class="text-muted small fw-medium">Showing 0 products</span>
          
          <div class="d-flex align-items-center gap-2">
            <button class="icon-btn" id="prevPageBtn" style="width:32px; height:32px;" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <span class="small text-muted fw-bold px-2" id="pageIndicator">1 / 1</span>
            <button class="icon-btn" id="nextPageBtn" style="width:32px; height:32px;" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Add / Edit Product Modal (Kept clean & functional for JS) -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content neo-card border-0">
      <div class="modal-header border-0 pb-0 pt-4 px-4">
        <h5 class="modal-title fw-bold" id="formTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form id="productForm">
          <input type="hidden" id="productId">
          
          <div class="mb-3">
            <label for="name" class="form-label small fw-semibold text-muted">Product Name</label>
            <input type="text" class="form-control neo-input" id="name" required placeholder="Enter product name">
            <div class="invalid-feedback" id="nameError"></div>
          </div>

          <div class="mb-3">
            <label for="category" class="form-label small fw-semibold text-muted">Category</label>
            <input type="text" class="form-control neo-input" id="category" required placeholder="e.g. Electronics, Apparel">
            <div class="invalid-feedback" id="categoryError"></div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="price" class="form-label small fw-semibold text-muted">Price ($)</label>
              <input type="number" step="0.01" min="0" class="form-control neo-input" id="price" required placeholder="0.00">
              <div class="invalid-feedback" id="priceError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="quantity" class="form-label small fw-semibold text-muted">Quantity</label>
              <input type="number" min="0" class="form-control neo-input" id="quantity" required placeholder="0">
              <div class="invalid-feedback" id="quantityError"></div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-3 align-items-center mt-4">
            <button type="button" class="neo-action-btn px-3 d-none" style="width: auto; height: 38px; border-radius: 12px; font-weight: 600;" id="cancelEditButton" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-primary-neo" id="submitButton">Add Product</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-4" id="toastContainer" style="z-index: 1100;"></div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Main App Script -->
  <script src="assets/js/app.js"></script>
</body>
</html>
