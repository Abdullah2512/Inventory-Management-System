<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products · Stockroom</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="index.html">
          <span class="brand-mark">SR</span>
          <span>
            <strong>Stockroom</strong>
            <small>Inventory Console</small>
          </span>
        </a>

        <nav class="nav-list" aria-label="Primary">
          <a class="nav-link" href="index.html">Dashboard</a>
          <a class="nav-link active" href="products.html">Products</a>
        </nav>

        <button class="profile-card" type="button" data-logout title="Log out">
          <span class="avatar" data-user-initial>A</span>
          <span>
            <strong data-user-name>Account</strong>
            <small data-user-email></small>
          </span>
        </button>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Catalog</p>
            <h1>Products</h1>
            <p id="productCount">0 products</p>
          </div>
          <button id="openAddModalBtn" class="primary-button compact-button" type="button">Add product</button>
        </header>

        <section class="stats-grid compact" aria-label="Product statistics">
          <article class="stat-card">
            <span>Total Products</span>
            <strong id="statTotalProducts">0</strong>
          </article>
          <article class="stat-card">
            <span>In Stock</span>
            <strong id="statInStock">0</strong>
          </article>
          <article class="stat-card warning">
            <span>Low Stock</span>
            <strong id="statLowStock">0</strong>
          </article>
          <article class="stat-card danger">
            <span>Out of Stock</span>
            <strong id="statOutOfStock">0</strong>
          </article>
          <article class="stat-card">
            <span>Units</span>
            <strong id="statTotalStock">0</strong>
          </article>
          <article class="stat-card">
            <span>Value</span>
            <strong id="statTotalValue">$0.00</strong>
          </article>
        </section>

        <section class="panel">
          <div class="toolbar">
            <label class="search-field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search name or category">
            </label>
            <label>
              <span>Category</span>
              <select id="categoryFilter">
                <option value="">All categories</option>
              </select>
            </label>
            <label>
              <span>Sort By</span>
              <select id="sortBy">
                <option value="id">ID</option>
                <option value="name">Name</option>
                <option value="category">Category</option>
                <option value="price">Price</option>
                <option value="quantity">Quantity</option>
                <option value="created_at">Created</option>
              </select>
            </label>
            <label>
              <span>Order</span>
              <select id="sortOrder">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
              </select>
            </label>
          </div>

          <div class="table-wrap">
            <table class="product-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Value</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productsTableBody"></tbody>
            </table>
          </div>

          <footer class="pagination-row">
            <span id="paginationInfo">No records to show</span>
            <div class="pager">
              <button id="prevPageBtn" class="secondary-button" type="button">Previous</button>
              <strong id="pageIndicator">1 / 1</strong>
              <button id="nextPageBtn" class="secondary-button" type="button">Next</button>
            </div>
          </footer>
        </section>
      </main>
    </div>

    <div id="modalBackdrop" class="modal-backdrop"></div>
    <section id="productModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="formTitle">
      <div class="modal-card">
        <header class="modal-header">
          <h2 id="formTitle">Add product</h2>
          <button class="icon-only" type="button" data-modal-close aria-label="Close">×</button>
        </header>

        <form id="productForm" class="form-grid" novalidate>
          <input id="productId" type="hidden">

          <label class="field span-2">
            <span>Product Name</span>
            <input id="name" type="text" maxlength="120" placeholder="Product name">
            <small id="nameError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Category</span>
            <input id="category" type="text" maxlength="80" placeholder="Category">
            <small id="categoryError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Price</span>
            <input id="price" type="number" min="0" step="0.01" placeholder="0.00">
            <small id="priceError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Quantity</span>
            <input id="quantity" type="number" min="0" step="1" placeholder="0">
            <small id="quantityError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Image</span>
            <input id="productImage" name="image" type="file" accept="image/jpeg,image/png,image/webp">
            <small id="productImageError" class="field-error"></small>
          </label>

          <div id="imagePreviewContainer" class="image-preview span-2" hidden>
            <img id="imagePreview" alt="Product preview">
          </div>

          <footer class="modal-actions span-2">
            <button id="cancelEditButton" class="secondary-button" type="button">Cancel</button>
            <button id="submitButton" class="primary-button" type="submit">Add product</button>
          </footer>
        </form>
      </div>
    </section>

    <div id="toastContainer" class="toast-container"></div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
