<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register · Stockroom</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/auth.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel">
        <a class="brand compact" href="login.html">
          <span class="brand-mark">SR</span>
          <span>
            <strong>Stockroom</strong>
            <small>Inventory Console</small>
          </span>
        </a>

        <div>
          <h1>Create account</h1>
          <p>Set up your secure workspace and start managing real product data.</p>
        </div>

        <form id="registerForm" class="form-stack" novalidate>
          <label class="field">
            <span>Name</span>
            <input id="name" type="text" autocomplete="name" maxlength="120" placeholder="Jane Doe">
            <small id="nameError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Email</span>
            <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
            <small id="emailError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Password</span>
            <div class="input-action">
              <input id="password" type="password" autocomplete="new-password" placeholder="At least 6 characters">
              <button type="button" data-password-toggle="password">Show</button>
            </div>
            <small id="passwordHint" class="field-hint"></small>
            <small id="passwordError" class="field-error"></small>
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter your password">
            <small id="confirmPasswordError" class="field-error"></small>
          </label>

          <button id="registerSubmit" class="primary-button" type="submit">
            <span>Create account</span>
          </button>
        </form>

        <p class="auth-switch">Already registered? <a href="login.html">Sign in</a></p>
      </section>

      <aside class="auth-showcase">
        <div class="showcase-metric">
          <span>Secure session</span>
          <strong>Token based</strong>
        </div>
        <div class="showcase-copy">
          <h2>Built for fast catalog operations.</h2>
          <p>Upload product images, filter inventory, and see stock value from live backend data.</p>
        </div>
      </aside>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
